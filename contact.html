<main>
    <section class="contact-page-wrapper">
        <div class="contact-card">
            
            <div class="contact-visual">
                <div class="visual-content">
                    <h2>Restons en contact</h2>
                    <p class="subtitle">Basé à <strong>Lubumbashi</strong>, je suis disponible pour discuter de vos projets mobiles, web ou d'IA.</p>
                    
                    <div class="direct-contact">
                        <div class="phone-number">
                            <i class="fa-solid fa-phone-flip"></i>
                            <span>+243 990 067 824</span>
                        </div>
                    </div>

                    <div class="app-links">
                        <p>Joignable directement sur :</p>
                        <div class="app-buttons">
                            <a href="https://wa.me/243990067824" target="_blank" class="app-btn whatsapp" title="Discuter sur WhatsApp">
                                <i class="fa-brands fa-whatsapp"></i>
                            </a>
                            <a href="https://t.me/+243990067824" target="_blank" class="app-btn telegram" title="Discuter sur Telegram">
                                <i class="fa-brands fa-telegram"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contact-form-side">
                <form action="#" method="POST">
                    <h3 class="form-title">Envoyez-moi un message</h3>
                    <div class="form-group">
                        <input type="text" id="nom" name="nom" required placeholder=" ">
                        <label for="nom">Votre Nom complet</label>
                    </div>
                    <div class="form-group">
                        <input type="tel" id="telephone" name="telephone" required placeholder=" ">
                        <label for="telephone">Votre Numéro de téléphone</label>
                    </div>
                    <button type="submit" class="btn-submit-modern">
                        Envoyer <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>

        </div>
    </section>
</main>
